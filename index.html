<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>CareLink — Drug-Centric UI Architecture Mockups</title>
<style>
:root{
  /* CareLink palette — warm light theme */
  --bg:#F5F0EB;--surface:#FDFBF8;--surface2:#f7f3ef;--surface3:#efe9e2;
  --border:rgba(120,100,80,.12);--border-strong:rgba(120,100,80,.25);
  --text:#3B3530;--text2:#7A7168;--text3:#9e958c;
  /* Primary */
  --accent:#5B7FA4;--accent2:#3E5F7E;--accent-light:#7D9DBF;--accent-bg:rgba(91,127,164,.08);
  /* Semantic */
  --green:#2e7d32;--green-bg:#f1f8f4;--green-border:#c8e6c9;
  --red:#d32f2f;--red-bg:#ffebee;--red-border:#ef9a9a;
  --yellow:#ed6c02;--yellow-bg:#fff3e0;--yellow-border:#ffe0b2;
  --blue:#1976d2;--blue-bg:#e3f2fd;--blue-border:#90caf9;
  --orange:#f57c00;--purple:#7b1fa2;--cyan:#0097a7;--pink:#c2185b;
  --radius:8px;--radius-lg:12px;
  /* Tooltip */
  --tooltip-bg:#3B3530;--tooltip-text:#F5F0EB
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:13px}

/* Top bar */
.top-bar{display:flex;align-items:center;gap:12px;padding:16px 32px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.top-bar h1{font-size:18px;font-weight:700;color:var(--accent2);white-space:nowrap}
.top-bar .sep{width:1px;height:24px;background:var(--border)}
.view-tabs{display:flex;gap:4px;flex:1}
.view-tab{padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;background:transparent;border:1px solid transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.view-tab:hover{background:var(--surface2);color:var(--text)}
.view-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:700;vertical-align:middle}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}.tag-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}.tag-purple{background:rgba(123,31,162,.08);color:var(--purple);border:1px solid rgba(123,31,162,.2)}

/* Views */
.view{display:none;padding:24px 32px;min-height:calc(100vh - 64px)}
.view.active{display:block}
.view-title{font-size:24px;font-weight:700;margin-bottom:4px}
.view-desc{color:var(--text2);font-size:14px;margin-bottom:24px;max-width:900px}

/* Annotations */
.annotation{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;margin:4px}
.annotation.pro{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.annotation.con{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.annotation.info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.pros-cons{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0 24px}

/* Sticky */
.sticky{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius);padding:14px 18px;margin:12px 0;font-size:13px;color:var(--yellow)}
.sticky.blue{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.sticky.green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.sticky b{font-weight:700}

.agent-note{background:rgba(123,31,162,.06);border:1px solid rgba(123,31,162,.2);border-radius:var(--radius);padding:14px 18px;font-size:13px;color:var(--purple);margin:12px 0;display:flex;align-items:flex-start;gap:10px}

/* Drug search / list */
.drug-search-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.drug-search-bar input{flex:1;max-width:500px;padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none}
.drug-search-bar input:focus{border-color:var(--accent)}
.drug-search-bar .shortcut{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.kbd{display:inline-flex;align-items:center;justify-content:center;background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;color:var(--text2);min-width:22px;font-family:monospace}

.drug-list{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px}
.drug-list-header{display:flex;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.drug-list-header span{flex:1}
.drug-list-header span:first-child{flex:2}
.drug-list-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.drug-list-row:hover{background:var(--surface2)}
.drug-list-row:last-child{border-bottom:none}
.drug-list-row span{flex:1;font-size:13px}
.drug-list-row span:first-child{flex:2;font-weight:600}
.drug-list-row.populated{border-left:3px solid var(--accent)}
.drug-list-row.populated:hover{background:var(--accent-bg)}
.drug-list-row.dim span{color:var(--text3)}
.drug-list-row .status{flex:0 0 auto}

/* Status pills */
.status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.status.eligible{background:var(--green-bg);color:var(--green)}
.status.pending{background:var(--yellow-bg);color:var(--yellow)}
.status.ineligible{background:var(--red-bg);color:var(--red)}
.status.in-stock{background:var(--green-bg);color:var(--green)}
.status.low{background:var(--yellow-bg);color:var(--yellow)}
.status.out{background:var(--red-bg);color:var(--red)}
.status.info{background:var(--blue-bg);color:var(--blue)}
.status.severe{background:var(--yellow-bg);color:var(--orange);border:1px solid var(--yellow-border)}
.status.neutral{background:var(--surface3);color:var(--text2)}

/* Drug header (shared) */
.drug-header-card{display:flex;gap:20px;align-items:center;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;flex-wrap:wrap}
.drug-icon-lg{width:56px;height:56px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0}
.drug-meta{flex:1;min-width:300px}
.drug-meta h2{font-size:18px;font-weight:700}
.drug-meta .sub{font-size:13px;color:var(--text2);display:flex;gap:16px;margin-top:2px;flex-wrap:wrap}
.drug-badges{display:flex;gap:6px;flex-wrap:wrap}
.drug-badge{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600}
.drug-badge.active-340b{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.drug-badge.controlled{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

/* Tables */
.mock-table{width:100%;border-collapse:collapse;font-size:12px}
.mock-table th{text-align:left;padding:8px 12px;background:var(--surface2);color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.mock-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.mock-table tr:hover td{background:var(--surface)}

/* Cards */
.overview-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.overview-card h5{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.stat-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.stat-row .label{color:var(--text2)}.stat-row .value{font-weight:600}
.stat-row .value.good{color:var(--green)}.stat-row .value.warn{color:var(--yellow)}.stat-row .value.alert{color:var(--red)}

/* Warning card */
.warning-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.warning-card.critical{border-left:3px solid var(--red)}
.warning-card.moderate{border-left:3px solid var(--orange)}
.warning-card h5{font-size:13px;font-weight:600;margin-bottom:4px}
.warning-card p{font-size:12px;color:var(--text2);line-height:1.5}

/* Monograph */
.monograph-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.monograph-section h5{font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:6px}
.monograph-section p{font-size:12px;color:var(--text2);line-height:1.6}

/* Domain card grid (modal) */
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.domain-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .15s;position:relative}
.domain-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(91,127,164,.15)}
.domain-card h4{font-size:14px;font-weight:600;margin-bottom:4px}
.domain-card p{font-size:12px;color:var(--text2);line-height:1.4}
.domain-card .card-stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.domain-card .stat{font-size:11px}
.domain-card .stat .val{font-size:18px;font-weight:700;display:block}
.domain-card .stat .val.warn{color:var(--yellow)}.domain-card .stat .val.good{color:var(--green)}.domain-card .stat .val.alert{color:var(--red)}
.domain-card .click-hint{position:absolute;bottom:8px;right:12px;font-size:10px;color:var(--text3);opacity:0;transition:opacity .15s}
.domain-card:hover .click-hint{opacity:1}
/* legacy detail-panel kept for compat */
.detail-panel{display:none}.detail-panel.show{display:block}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:6px;background:var(--surface3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-body{padding:24px}
/* True modal overlay — fixed to viewport */
.modal-backdrop-fixed{display:none;position:fixed;inset:0;z-index:200;background:rgba(59,53,48,.45);backdrop-filter:blur(4px);overflow-y:auto;padding:40px 20px}
.modal-backdrop-fixed.show{display:flex;justify-content:center;align-items:flex-start}
.modal-overlay{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:1200px;box-shadow:0 20px 40px rgba(60,50,40,.18);margin:auto}
/* Nested detail panel inside modal */
.detail-panel-nested{display:none;position:fixed;inset:0;z-index:210;background:rgba(59,53,48,.35);backdrop-filter:blur(2px);overflow-y:auto;padding:60px 20px}
.detail-panel-nested.show{display:flex;justify-content:center;align-items:flex-start}
.detail-panel-nested .nested-inner{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:1000px;box-shadow:0 20px 40px rgba(60,50,40,.18);margin:auto}

/* Current state */
.current-layout{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;height:580px;margin-bottom:24px}
.current-sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.current-sidebar .nav-group{padding:8px 0}
.current-sidebar .nav-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:6px 16px}
.current-sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:13px;color:var(--text2);cursor:pointer;position:relative}
.current-sidebar .nav-item:hover{background:var(--surface2);color:var(--text)}
.current-sidebar .nav-item.active{background:var(--accent-bg);color:var(--accent2)}
.current-sidebar .nav-item .highlight-dot{position:absolute;right:12px;width:8px;height:8px;border-radius:50%;background:var(--yellow)}
.current-workspace{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.current-tab-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.current-tab{padding:10px 20px;font-size:12px;color:var(--text2);border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.current-tab.active{background:var(--bg);color:var(--text);border-bottom:2px solid var(--accent)}
.current-tab .hl{background:var(--yellow);color:#000;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.current-content{flex:1;display:flex;align-items:center;justify-content:center;padding:32px}
.hop-diagram{display:flex;flex-wrap:wrap;gap:16px;margin:24px 0}
.hop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;flex:1;min-width:260px}
.hop-card h4{font-size:13px;font-weight:600;margin-bottom:8px}
.hop-steps{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hop-step{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600}
.hop-step.yellow{background:var(--yellow-bg);border:1px solid var(--yellow-border);color:var(--yellow)}
.hop-arrow{color:var(--text3);font-size:14px}

/* Tab flow */
.tabflow-layout{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface)}
.tabflow-breadcrumb{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:13px}
.tabflow-breadcrumb .crumb{color:var(--accent2);cursor:pointer}.tabflow-breadcrumb .crumb:hover{text-decoration:underline}
.tabflow-breadcrumb .crumb.current{color:var(--text);cursor:default}.tabflow-breadcrumb .crumb.current:hover{text-decoration:none}
.tabflow-breadcrumb .sep{color:var(--text3)}
.tabflow-drug-bar{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.tabflow-drug-bar .drug-pill{display:flex;align-items:center;gap:8px}
.tabflow-drug-bar .drug-pill .icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.tabflow-drug-bar .drug-pill .name{font-weight:600;font-size:14px}
.tabflow-drug-bar .drug-pill .ndc{font-size:12px;color:var(--text2)}
.tabflow-subtabs{display:flex;gap:2px;padding:0 20px;background:var(--surface2);border-bottom:1px solid var(--border);overflow-x:auto}
.subtab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;position:relative;display:flex;align-items:center;gap:4px}
.subtab:hover{color:var(--text);background:rgba(120,100,80,.04)}
.subtab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.subtab .dropdown{display:none;position:absolute;top:100%;left:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 0;min-width:220px;box-shadow:0 8px 24px rgba(60,50,40,.12);z-index:10}
.subtab:hover .dropdown{display:block}
.subtab .dropdown-item{padding:8px 16px;font-size:12px;color:var(--text2);cursor:pointer}
.subtab .dropdown-item:hover{background:var(--surface3);color:var(--text)}
.tabflow-content{padding:24px;min-height:400px;background:var(--bg)}
.tabflow-content-section{display:none}.tabflow-content-section.active{display:block}
.tabflow-open-tabs{display:flex;align-items:center;gap:0;padding:0 20px;background:var(--surface);border-top:1px solid var(--border);overflow-x:auto}
.open-tab{padding:8px 16px;font-size:12px;color:var(--text2);border-right:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.open-tab.active{color:var(--text);background:var(--bg)}

/* Command center */
.cmd-wrapper{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;height:820px}
.cmd-layout{display:flex;gap:0;flex:1;overflow:hidden;min-height:0}
.cmd-left{width:320px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.cmd-drug-card{padding:20px;border-bottom:1px solid var(--border)}
.cmd-drug-card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.cmd-drug-card .meta{font-size:12px;color:var(--text2)}
.cmd-drug-card .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.cmd-sections{flex:1;overflow-y:auto}
.cmd-section{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cmd-section:hover{background:var(--surface2)}
.cmd-section.active{background:var(--accent-bg);border-left:3px solid var(--accent)}
.cmd-section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.cmd-section-header .left{display:flex;align-items:center;gap:10px}
.cmd-section-header .icon{font-size:16px;width:20px;text-align:center}
.cmd-section-header .label{font-size:13px;font-weight:600}
.cmd-section-header .badge{font-size:11px;color:var(--text2);background:var(--surface3);padding:2px 8px;border-radius:10px}
.cmd-section-header .badge.alert{background:var(--red-bg);color:var(--red)}
.cmd-section-header .badge.good{background:var(--green-bg);color:var(--green)}
.cmd-section-header .badge.warn{background:var(--yellow-bg);color:var(--yellow)}
.cmd-section-preview{padding:0 16px 12px 46px;font-size:12px;color:var(--text3)}
.cmd-right{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.cmd-right-header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cmd-right-header h3{font-size:16px;font-weight:600}
.cmd-right-body{flex:1;padding:20px;overflow-y:auto}
.cmd-detail-view{display:none}.cmd-detail-view.active{display:block}
.cmd-bottom-drawer{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.cmd-drawer-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2)}
.cmd-drawer-toggle:hover{background:var(--surface2)}
.cmd-drawer-content{padding:0 20px 16px;display:none}.cmd-drawer-content.show{display:block}

/* Comparison */
.comparison-table{width:100%;border-collapse:collapse;font-size:13px}
.comparison-table th{padding:12px 16px;background:var(--surface2);color:var(--text2);font-weight:600;text-align:left;border-bottom:2px solid var(--border)}
.comparison-table td{padding:10px 16px;border-bottom:1px solid var(--border);vertical-align:top}
.comparison-table tr:hover td{background:var(--surface)}
.comparison-table .dim{color:var(--text2);font-weight:600;width:180px}
.check{color:var(--green)}.cross{color:var(--red)}.partial{color:var(--yellow)}

/* Data map */
.data-map{display:flex;flex-direction:column;align-items:center;gap:0;margin:24px 0}
.data-map-center{width:180px;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--radius-lg);text-align:center;color:#fff;font-weight:700;font-size:14px;position:relative;z-index:2}
.data-map-ring{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:-8px;padding-top:20px}
.data-map-node{width:150px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-align:center;font-size:12px;font-weight:600;position:relative}
.data-map-node::before{content:'';position:absolute;top:-12px;left:50%;width:1px;height:12px;background:var(--border)}
.data-map-node .count{font-size:10px;color:var(--text3);font-weight:400;margin-top:2px}

/* Pill visual */
.pill-visual{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#faf8f5,#efe9e2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text);font-weight:700;border:2px solid var(--border-strong);text-align:center;line-height:1.2;flex-shrink:0}

/* Command Center bottom drug tabs + compare */
.cmd-drug-tabs{border-top:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;z-index:5}
.cmd-drug-tabs-bar{display:flex;align-items:center;overflow-x:auto}
.cmd-drug-tab{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:12px;color:var(--text2);border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:background .1s;position:relative}
.cmd-drug-tab:hover{background:var(--surface2)}
.cmd-drug-tab.active{color:var(--text);background:var(--bg);font-weight:600}
.cmd-drug-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.cmd-drug-tab .tab-icon{width:20px;height:20px;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.cmd-drug-tab .tab-ndc{font-size:10px;color:var(--text3);font-family:monospace}
.cmd-drug-tab .tab-badges{display:flex;gap:4px}
.cmd-drug-tab .tab-close{font-size:11px;color:var(--text3);cursor:pointer;margin-left:4px;padding:2px}
.cmd-drug-tab .tab-close:hover{color:var(--red)}
.cmd-drug-tabs-actions{margin-left:auto;display:flex;align-items:center;gap:8px;padding:8px 16px;flex-shrink:0}
.cmd-compare-toggle{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .15s}
.cmd-compare-toggle:hover{border-color:var(--accent);color:var(--accent)}
.cmd-compare-toggle.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.cmd-compare-panel{display:none;border-top:1px solid var(--border);max-height:280px;overflow-y:auto;background:var(--surface)}
.cmd-compare-panel.show{display:block}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{padding:8px 12px;background:var(--surface2);color:var(--text2);font-weight:600;text-align:left;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
.compare-table td{padding:6px 12px;border-bottom:1px solid var(--border)}
.compare-table td:first-child{font-weight:600;color:var(--text2);width:160px;white-space:nowrap}
.compare-table tr:hover td{background:var(--surface2)}
.compare-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent2);transition:all .15s}
.compare-btn:hover{background:var(--accent);color:#fff}
.compare-btn.active{background:var(--accent);color:#fff}

@media(max-width:1200px){.domain-grid{grid-template-columns:repeat(2,1fr)}.overview-grid{grid-template-columns:repeat(2,1fr)}}

function renderPricing() {
  const ceilingStr = PR.ceiling340b != null ? '$'+PR.ceiling340b.toFixed(2) : 'N/A';
  const fulStr = PR.ful != null ? '$'+PR.ful.toFixed(2) : 'N/A';
  const savingsNote = P.threshold > 0 && PR.ceiling340b != null
    ? `<div class="sticky blue" style="margin-top:16px"><b>Savings analysis:</b> ${I.reorderQty} units at 340B (${ceilingStr}) vs WAC ($${PR.wac}) saves <b>$${P.savingsPerOrder.toLocaleString()} per order</b>. At ${C.velocity} dispensing.</div>`
    : (D.dea ? `<div class="sticky" style="margin-top:16px"><b>Note:</b> No 340B savings available — Schedule ${D.dea} controlled substances are excluded from the 340B program.</div>` : '');
  return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">
    <div class="overview-card"><h5>WAC</h5><div style="font-size:22px;font-weight:700;">$${PR.wac.toFixed(2)}</div></div>
    <div class="overview-card"><h5>340B Ceiling</h5><div style="font-size:22px;font-weight:700;color:${PR.ceiling340b!=null?'var(--green)':'var(--text3)'};">${ceilingStr}</div></div>
    <div class="overview-card"><h5>Acquisition</h5><div style="font-size:22px;font-weight:700;">$${PR.acquisition.toFixed(2)}</div></div>
    <div class="overview-card"><h5>AWP</h5><div style="font-size:22px;font-weight:700;">$${PR.awp.toFixed(2)}</div></div>
    <div class="overview-card"><h5>FUL</h5><div style="font-size:22px;font-weight:700;">${fulStr}</div></div>
  </div>
  <table class="mock-table"><thead><tr><th>Price Type</th><th>Unit</th><th>Package</th><th>Size</th><th>Effective</th><th>Source</th><th>Current</th></tr></thead><tbody>
  ${PR.history.map(p=>`<tr><td>${p.type}</td><td>${p.unit}</td><td>${p.pkg}</td><td>${p.size}</td><td>${p.effective}</td><td>${p.source}</td><td>${statusPill(p.current?'Yes':'Expired',p.current?'eligible':'pending')}</td></tr>`).join('')}
  </tbody></table>
  ${savingsNote}`;
}

function renderOverviewCards() {
  const bbwCount = S.warnings.filter(w=>w.level==='critical').length;

  const pct340b = P.threshold > 0 ? Math.round(P.totalAccumulated/P.threshold*100)+'%' : 'N/A';

  return `<div class="overview-grid">

    <div class="overview-card"><h5>&#127973; 340B Program</h5>${statRow('Accumulated',P.totalAccumulated+' units',P.totalAccumulated>0?'good':'')}${statRow('Threshold',P.threshold>0?P.threshold+' ('+pct340b+')':'N/A')}${statRow('Ceiling Price',ceilingStr,ceilingCls)}${statRow('Entities',P.entities.length>0?P.entities.length+' active':'None')}${statRow('Q1 Savings',P.quarterlySavings>0?'$'+P.quarterlySavings.toLocaleString():'N/A',P.quarterlySavings>0?'good':'')}</div>
    <div class="overview-card"><h5>&#9888; Safety</h5>${statRow('Warnings',S.warnings.length+(bbwCount?' ('+bbwCount+' BBW)':''),'alert')}${statRow('Interactions',S.interactions.length+(ciCount?' ('+ciCount+' CI)':''),'warn')}${statRow('Controlled',I.controlled?I.schedule:'No',I.controlled?'alert':'')}${statRow('REMS',E.medGuide.note&&E.medGuide.note.includes('REMS')?'Yes':'No',E.medGuide.note&&E.medGuide.note.includes('REMS')?'warn':'')}</div>
    <div class="overview-card"><h5>&#128218; Education</h5>${statRow('Monographs',E.monographs.length+' sections')}${statRow('MedGuides','1 (PDF)')}${statRow('Counseling',E.counseling.length+' messages')}</div>
    <div class="overview-card"><h5>&#128176; Pricing</h5>${statRow('WAC','$'+PR.wac.toFixed(2)+'/unit')}${statRow('340B Ceiling',ceilingStr,ceilingCls)}${statRow('Acquisition','$'+PR.acquisition.toFixed(2)+'/unit')}${statRow('AWP','$'+PR.awp.toFixed(2)+'/unit')}</div>

function switchView(id, el) {
  // Reset inner views back to search state when switching top-level tabs
  closeModal();
  const tfIntro = document.getElementById('tf-intro');
  const tfView = document.getElementById('tf-drug-view');
  if (tfIntro && tfView) { tfIntro.style.display = 'block'; tfView.style.display = 'none'; }
  const cmdIntro = document.getElementById('cmd-intro');
  const cmdView = document.getElementById('cmd-drug-view');
  if (cmdIntro && cmdView) { cmdIntro.style.display = 'block'; cmdView.style.display = 'none'; }

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  el.classList.add('active');
  window.scrollTo(0, 0);
}

// Modal stack management
function openModal() {
  document.getElementById('modal-drug-detail').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-drug-detail').classList.remove('show');
  document.querySelectorAll('.detail-panel-nested').forEach(p => p.classList.remove('show'));
  document.body.style.overflow = '';
}
function openNestedModal(id) {
  document.querySelectorAll('.detail-panel-nested').forEach(p => p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}
function closeNestedModal(id) {
  document.getElementById(id).classList.remove('show');
}
// ESC key: close nested first, then main modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const openNested = document.querySelector('.detail-panel-nested.show');
    if (openNested) { openNested.classList.remove('show'); return; }
    const mainModal = document.getElementById('modal-drug-detail');
    if (mainModal && mainModal.classList.contains('show')) { closeModal(); }
  }
});

// SHARED OPEN DRUG TABS (Tab Flow + Command Center)
// ═══════════════════════════════════════
let openDrugTabs = []; // [{key, name}] — max 3, shared across views
let showComparePanel = false;
const MAX_OPEN_TABS = 3;

function pinDrugTab(key) {
  // Move to front if already open
  const existing = openDrugTabs.findIndex(t => t.key === key);
  if (existing >= 0) return; // already pinned
  const drug = DRUG_DB[key];
  openDrugTabs.push({ key, name: drug.name });
  // Evict oldest if over limit
  while (openDrugTabs.length > MAX_OPEN_TABS) {
    openDrugTabs.shift();
  }
}

function closeDrugTab(key, evt, viewType) {
  if (evt) evt.stopPropagation();
  // Don't close if it's the only tab
  if (openDrugTabs.length <= 1) return;
  openDrugTabs = openDrugTabs.filter(t => t.key !== key);
  if (openDrugTabs.length < 2) showComparePanel = false;
  // If we closed the active tab, switch to the last remaining one
  if (key === activeDrugKey) {
    const newKey = openDrugTabs[openDrugTabs.length - 1].key;
    if (viewType === 'cmd') switchDrugTab(newKey);
    else switchDrugInTabFlow(newKey);
    return;
  }
  renderAllOpenTabs();
}

function switchDrugTab(key) {
  setActiveDrug(key);
  document.getElementById('view-command').innerHTML = renderCommandCenter();
  document.getElementById('cmd-intro').style.display = 'none';
  document.getElementById('cmd-drug-view').style.display = 'block';
  renderAllOpenTabs();
}

function toggleComparePanel() {
  showComparePanel = !showComparePanel;
  renderAllOpenTabs();
}

// Render tabs into BOTH containers (whichever exists on screen)
function renderAllOpenTabs() {
  renderOpenTabBar('cmd-drug-tabs-container', 'cmd');
  renderOpenTabBar('tf-drug-tabs-container', 'tf');
}

function renderOpenTabBar(containerId, viewType) {
  const container = document.getElementById(containerId);
  if (!container) return;

  // Ensure active drug is pinned
  if (!openDrugTabs.find(t => t.key === activeDrugKey)) {
    openDrugTabs.push({ key: activeDrugKey, name: DRUG_DB[activeDrugKey].name });
    while (openDrugTabs.length > MAX_OPEN_TABS) openDrugTabs.shift();
  }

  const switchFn = viewType === 'cmd' ? 'switchDrugTab' : 'switchDrugInTabFlow';
  const tabs = openDrugTabs.map(t => {
    const drug = DRUG_DB[t.key];
    const isActive = t.key === activeDrugKey;
    const stockCls = drug.inventory.onHand <= drug.inventory.reorderPoint ? 'low' : 'in-stock';
    const shortName = drug.name.split(' ').slice(0,2).join(' ');
    return `<div class="cmd-drug-tab ${isActive?'active':''}" onclick="${switchFn}('${t.key}')">
      <div class="tab-icon">${drug.name[0]}</div>
      <div>
        <div>${shortName}</div>
        <div class="tab-ndc">${drug.ndc}</div>
      </div>
      <div class="tab-badges">
        <span class="status ${stockCls}" style="font-size:10px;padding:1px 6px">${drug.inventory.onHand}</span>
        ${drug.safety.warnings.length>0?'<span class="status out" style="font-size:10px;padding:1px 6px">'+drug.safety.warnings.length+'W</span>':''}
      </div>
      ${openDrugTabs.length > 1 ? `<span class="tab-close" onclick="closeDrugTab('${t.key}',event,'${viewType}')">&times;</span>` : ''}
    </div>`;
  }).join('');

  let compareHtml = '';
  if (showComparePanel && openDrugTabs.length >= 2) {
    const drugs = openDrugTabs.map(t => DRUG_DB[t.key]);
    const rows = [
      { label:'Class',           fn: d => d.drugClass },
      { label:'Stock On Hand',   fn: d => `<span style="font-weight:700;color:${d.inventory.onHand<=d.inventory.reorderPoint?'var(--yellow)':'var(--green)'}">${d.inventory.onHand}</span>` },
      { label:'Reorder Point',   fn: d => d.inventory.reorderPoint },
      { label:'Storage',         fn: d => d.inventory.refrigeration ? '<span style="color:var(--blue)">Refrigerated</span>' : 'Room Temp' },
      { label:'Controlled',      fn: d => d.inventory.controlled ? '<span style="color:var(--red)">'+d.inventory.schedule+'</span>' : 'No' },
      { label:'340B Status',     fn: d => d.program340b.threshold > 0 ? '<span style="color:var(--green)">Active</span>' : '<span style="color:var(--text3)">Inactive</span>' },
      { label:'340B Accum / Thr',fn: d => d.program340b.threshold > 0 ? `${d.program340b.totalAccumulated} / ${d.program340b.threshold}${d.program340b.totalAccumulated>=d.program340b.threshold?' <span style="color:var(--yellow)">⚠ OVER</span>':''}` : 'N/A' },
      { label:'Ceiling Price',   fn: d => d.program340b.ceilingPrice > 0 ? '$' + d.program340b.ceilingPrice.toFixed(2) : 'N/A' },
      { label:'Warnings',        fn: d => `${d.safety.warnings.length} (${d.safety.warnings.filter(w=>w.level==='critical').length} BBW)` },
      { label:'DDIs',            fn: d => d.safety.interactions.length },
      { label:'WAC',             fn: d => '$' + d.pricing.wac.toFixed(2) },
      { label:'340B Price',      fn: d => d.pricing.ceiling340b != null ? '$' + d.pricing.ceiling340b.toFixed(2) : 'N/A' },
      { label:'Acquisition',     fn: d => '$' + d.pricing.acquisition.toFixed(2) },
      { label:'Active Rx',       fn: d => d.clinical.totalRx },
      { label:'Patients',        fn: d => d.clinical.totalPatients },
    ];
    const headerCells = drugs.map(d => {
      const short = d.name.split(' ').slice(0,2).join(' ');
      const isActive = d.ndc === DRUG_DB[activeDrugKey].ndc;
      return `<th${isActive?' style="color:var(--accent)"':''}>${short}</th>`;
    }).join('');
    const bodyRows = rows.map(r => `<tr><td>${r.label}</td>${drugs.map(d => `<td>${r.fn(d)}</td>`).join('')}</tr>`).join('');
    compareHtml = `<div class="cmd-compare-panel show"><table class="compare-table"><thead><tr><th>Metric</th>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table></div>`;
  }

  container.innerHTML = `<div class="cmd-drug-tabs">
    <div class="cmd-drug-tabs-bar">
      ${tabs}
      <div class="cmd-drug-tabs-actions">
        ${openDrugTabs.length >= 2 ? `<button class="cmd-compare-toggle ${showComparePanel?'active':''}" onclick="toggleComparePanel()">${showComparePanel?'▼ Hide':'▲ Compare'} (${openDrugTabs.length})</button>` : ''}
        <span style="font-size:11px;color:var(--text3)">${openDrugTabs.length} drug${openDrugTabs.length>1?'s':''} open</span>
      </div>
    </div>
    ${compareHtml}
  </div>`;
}
</script>
</body>
</html>
